<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💸 Money Flow — บันทึกรายรับรายจ่าย</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ================= Global ================= */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }

    :root {
      --green: #34d399;
      --red: #fb7185;
      --text: #1e293b;
      --muted: #64748b;
      --card-bg: rgba(255, 255, 255, 0.72);
      --card-border: rgba(255, 255, 255, 0.9);
      --input-bg: rgba(255, 255, 255, 0.65);
      --shadow: 0 20px 45px rgba(80, 70, 180, 0.14);
      --track: rgba(100, 116, 139, 0.15);
    }

    /* ธีมมืด: สลับตัวแปรสีทั้งหมด */
    body.dark {
      --text: #e2e8f0;
      --muted: #94a3b8;
      --card-bg: rgba(30, 32, 60, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(15, 16, 40, 0.5);
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
      --track: rgba(148, 163, 184, 0.15);
    }

    body {
      min-height: 100vh;
      color: var(--text);
      padding: 32px 16px 60px;
      background: linear-gradient(135deg, #e0e7ff, #fce7f3, #d1fae5);
      transition: background 0.6s, color 0.4s;
      overflow-x: hidden;
    }

    body.dark { background: linear-gradient(135deg, #0f1024, #1e1b4b, #171532); }

    /* ============ พื้นหลัง Aurora ลอยวน ============ */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      z-index: -1;
      animation: float 16s ease-in-out infinite alternate;
    }
    .blob.b1 { width: 420px; height: 420px; background: #a78bfa; top: -120px; left: -120px; }
    .blob.b2 { width: 360px; height: 360px; background: #f472b6; bottom: -100px; right: -100px; animation-delay: -5s; }
    .blob.b3 { width: 300px; height: 300px; background: #34d399; top: 40%; left: 60%; animation-delay: -10s; }

    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, -50px) scale(1.15); }
    }

    .container { max-width: 560px; margin: 0 auto; }

    /* ================= Header ================= */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      animation: drop 0.6s ease both;
    }

    .topbar h1 {
      font-size: 1.45rem;
      font-weight: 800;
      background: linear-gradient(90deg, #8b5cf6, #ec4899, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 200% auto;
      animation: shine 4s linear infinite;
    }

    @keyframes shine { to { background-position: 200% center; } }

    /* ปุ่มสลับธีม */
    .theme-btn {
      width: 46px; height: 46px;
      border: 1px solid var(--card-border);
      border-radius: 50%;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.34, 1.8, 0.64, 1);
      box-shadow: var(--shadow);
    }
    .theme-btn:hover { transform: rotate(30deg) scale(1.12); }

    /* ================= Card (Glassmorphism) ================= */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      animation: drop 0.7s ease both;
      transition: background 0.4s, border 0.4s;
    }

    .card:nth-of-type(2) { animation-delay: 0.12s; }
    .card:nth-of-type(3) { animation-delay: 0.24s; }

    @keyframes drop {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ================= Dashboard ================= */
    .dash { display: flex; align-items: center; gap: 22px; }

    /* วงแหวน Donut แสดงสัดส่วนรายจ่าย */
    .ring-wrap { position: relative; width: 130px; height: 130px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .ring-bg   { fill: none; stroke: var(--track); stroke-width: 11; }
    .ring-fill {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 11;
      stroke-linecap: round;
      stroke-dasharray: 326.7;
      stroke-dashoffset: 326.7;
      transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ring-center {
      position: absolute; inset: 0;
      display: grid; place-items: center; text-align: center;
    }
    .ring-center .pct  { font-size: 1.35rem; font-weight: 800; }
    .ring-center .sub  { font-size: 0.62rem; color: var(--muted); margin-top: -3px; }

    .dash-info { flex: 1; min-width: 0; }
    .dash-info .label { font-size: 0.78rem; color: var(--muted); }

    .balance {
      font-size: 1.9rem;
      font-weight: 800;
      margin: 2px 0 14px;
      transition: color 0.3s;
    }

    .mini-totals { display: flex; flex-direction: column; gap: 8px; }

    .mini {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.85rem; font-weight: 600;
    }
    .mini .dot {
      width: 10px; height: 10px; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .mini.income  .dot { background: var(--green); }
    .mini.expense .dot { background: var(--red); animation-delay: 1s; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.5); }
      50%      { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
    }

    .income-text  { color: var(--green); }
    .expense-text { color: var(--red); }

    /* ================= Section title ================= */
    .section-title {
      font-size: 1rem; font-weight: 700;
      margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* ================= Form ================= */
    .form-group { margin-bottom: 15px; }

    label {
      display: block; font-size: 0.78rem; font-weight: 500;
      color: var(--muted); margin-bottom: 6px;
    }

    input[type="text"], input[type="number"] {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid transparent;
      border-radius: 14px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.95rem; font-family: inherit;
      outline: none;
      transition: all 0.25s;
    }
    input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.18);
      transform: translateY(-1px);
    }
    input::placeholder { color: var(--muted); opacity: 0.6; }

    /* Toggle รายรับ/รายจ่าย แบบสไลด์ */
    .type-toggle {
      position: relative;
      display: flex;
      background: var(--input-bg);
      border-radius: 14px;
      padding: 5px;
    }
    .type-slider {
      position: absolute;
      top: 5px; left: 5px;
      width: calc(50% - 5px); height: calc(100% - 10px);
      border-radius: 10px;
      background: linear-gradient(135deg, #34d399, #10b981);
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
      transition: all 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
      z-index: 0;
    }
    .type-slider.right {
      left: 50%;
      background: linear-gradient(135deg, #fb7185, #f43f5e);
      box-shadow: 0 4px 14px rgba(244, 63, 94, 0.4);
    }
    .type-btn {
      flex: 1; padding: 11px;
      border: none; background: transparent;
      font-size: 0.9rem; font-family: inherit;
      color: var(--muted); cursor: pointer;
      position: relative; z-index: 1;
      transition: color 0.3s;
    }
    .type-btn.on { color: #fff; font-weight: 700; }

    /* ปุ่มบันทึก + ripple */
    .submit-btn {
      position: relative; overflow: hidden;
      width: 100%; padding: 15px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      background-size: 200% auto;
      color: #fff; font-size: 1rem; font-weight: 700; font-family: inherit;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(139, 92, 246, 0.4);
      transition: all 0.3s;
    }
    .submit-btn:hover  { background-position: right center; transform: translateY(-2px); box-shadow: 0 14px 30px rgba(236, 72, 153, 0.45); }
    .submit-btn:active { transform: scale(0.98); }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      transform: scale(0);
      animation: rip 0.6s ease-out;
      pointer-events: none;
    }
    @keyframes rip { to { transform: scale(4); opacity: 0; } }

    /* ================= Filter tabs ================= */
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-tab {
      padding: 7px 16px;
      border: 1px solid var(--card-border);
      border-radius: 99px;
      background: var(--input-bg);
      color: var(--muted);
      font-size: 0.78rem; font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
    }
    .filter-tab:hover { transform: translateY(-2px); }
    .filter-tab.active {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: #fff; font-weight: 600;
      border-color: transparent;
      box-shadow: 0 6px 14px rgba(139, 92, 246, 0.35);
    }

    /* ================= History ================= */
    .history-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 15px;
      border-radius: 16px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      animation: pop 0.4s cubic-bezier(0.34, 1.4, 0.64, 1) both;
      transition: transform 0.25s, box-shadow 0.25s, opacity 0.3s;
    }
    .history-item:hover { transform: translateX(6px) scale(1.01); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .history-item.removing { opacity: 0; transform: translateX(60px) scale(0.9); }

    @keyframes pop {
      from { opacity: 0; transform: translateY(-10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .item-icon {
      width: 40px; height: 40px;
      border-radius: 13px;
      display: grid; place-items: center;
      font-size: 1.05rem; flex-shrink: 0;
    }
    .item-icon.income  { background: rgba(52, 211, 153, 0.18); }
    .item-icon.expense { background: rgba(251, 113, 133, 0.18); }

    .item-info { flex: 1; min-width: 0; }
    .item-info .name { font-size: 0.9rem; font-weight: 600; word-break: break-word; }
    .item-info .date { font-size: 0.7rem; color: var(--muted); }

    .item-amount { font-weight: 800; font-size: 0.92rem; white-space: nowrap; }

    .delete-btn {
      border: none; background: transparent;
      font-size: 1rem; cursor: pointer;
      padding: 6px 8px; border-radius: 10px;
      opacity: 0.4; flex-shrink: 0;
      transition: all 0.2s;
    }
    .delete-btn:hover { opacity: 1; transform: scale(1.2) rotate(8deg); background: rgba(251, 113, 133, 0.18); }

    .clear-btn {
      border: none; background: transparent;
      font-size: 0.73rem; font-family: inherit;
      color: var(--muted); cursor: pointer;
      text-decoration: underline;
    }
    .clear-btn:hover { color: var(--red); }

    .empty-msg { text-align: center; color: var(--muted); font-size: 0.88rem; padding: 34px 0; }
    .empty-msg .emoji { font-size: 2.4rem; display: block; margin-bottom: 10px; animation: bounce 2s infinite; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    /* ================= Toast ================= */
    .toast {
      position: fixed;
      bottom: 26px; left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: var(--text);
      color: var(--card-bg);
      padding: 13px 24px;
      border-radius: 99px;
      font-size: 0.85rem; font-weight: 500;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
      transition: transform 0.4s cubic-bezier(0.34, 1.6, 0.64, 1);
      z-index: 99; pointer-events: none;
    }
    body.dark .toast { background: #e2e8f0; color: #1e293b; }
    body:not(.dark) .toast { background: #1e293b; color: #fff; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ================= Confetti ================= */
    .confetti {
      position: fixed;
      width: 9px; height: 9px;
      top: -12px;
      z-index: 98; pointer-events: none;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
    }

    /* ================= Responsive ================= */
    @media (max-width: 460px) {
      .dash { flex-direction: column; text-align: center; }
      .mini-totals { align-items: center; }
      .balance { font-size: 1.6rem; margin-bottom: 10px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- พื้นหลัง Aurora -->
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="container">

    <!-- ===== Topbar ===== -->
    <div class="topbar">
      <h1>💸 Money Flow</h1>
      <button class="theme-btn" id="themeBtn" title="สลับธีม">🌙</button>
    </div>

    <!-- ===== Dashboard ===== -->
    <div class="card">
      <div class="dash">
        <!-- วงแหวนสัดส่วนรายจ่าย -->
        <div class="ring-wrap">
          <svg viewBox="0 0 120 120">
            <defs>
              <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fb7185"/>
                <stop offset="100%" stop-color="#f43f5e"/>
              </linearGradient>
            </defs>
            <circle class="ring-bg" cx="60" cy="60" r="52"/>
            <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="52"/>
          </svg>
          <div class="ring-center">
            <div>
              <div class="pct" id="ringPct">0%</div>
              <div class="sub">ใช้ไปจากรายรับ</div>
            </div>
          </div>
        </div>

        <div class="dash-info">
          <div class="label">ยอดเงินคงเหลือ</div>
          <div class="balance income-text" id="balance">0.00 ฿</div>
          <div class="mini-totals">
            <div class="mini income"><span class="dot"></span> รายรับ&nbsp; <span class="income-text" id="totalIncome">0.00 ฿</span></div>
            <div class="mini expense"><span class="dot"></span> รายจ่าย <span class="expense-text" id="totalExpense">0.00 ฿</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== ฟอร์ม ===== -->
    <div class="card">
      <div class="section-title">📝 เพิ่มรายการใหม่</div>
      <form id="transactionForm">
        <div class="form-group">
          <label for="name">ชื่อรายการ</label>
          <input type="text" id="name" placeholder="เช่น ค่าอาหารกลางวัน" required />
        </div>
        <div class="form-group">
          <label for="amount">จำนวนเงิน (บาท)</label>
          <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
        </div>
        <div class="form-group">
          <label>ประเภทรายการ</label>
          <div class="type-toggle">
            <div class="type-slider" id="typeSlider"></div>
            <button type="button" class="type-btn on" id="incomeBtn">➕ รายรับ</button>
            <button type="button" class="type-btn" id="expenseBtn">➖ รายจ่าย</button>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">บันทึกรายการ ✨</button>
      </form>
    </div>

    <!-- ===== ประวัติ ===== -->
    <div class="card">
      <div class="section-title">
        <span>📋 ประวัติรายการ <span id="itemCount" style="color:var(--muted);font-size:0.78rem;font-weight:400;"></span></span>
        <button class="clear-btn" id="clearAllBtn">ล้างทั้งหมด</button>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">ทั้งหมด</button>
        <button class="filter-tab" data-filter="income">รายรับ</button>
        <button class="filter-tab" data-filter="expense">รายจ่าย</button>
      </div>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ================= ตัวแปรหลัก =================
    const STORAGE_KEY = 'transactions';
    const THEME_KEY = 'theme';
    let transactions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let selectedType = 'income';
    let currentFilter = 'all';
    // เก็บค่าล่าสุดไว้ทำ animation นับเลข
    let prev = { income: 0, expense: 0, balance: 0 };

    // ================= Elements =================
    const $ = id => document.getElementById(id);
    const form = $('transactionForm'), nameInput = $('name'), amountInput = $('amount');
    const incomeBtn = $('incomeBtn'), expenseBtn = $('expenseBtn'), typeSlider = $('typeSlider');
    const historyList = $('historyList'), balanceEl = $('balance');
    const totalIncomeEl = $('totalIncome'), totalExpenseEl = $('totalExpense');
    const ringFill = $('ringFill'), ringPct = $('ringPct');
    const itemCountEl = $('itemCount'), clearAllBtn = $('clearAllBtn');
    const toastEl = $('toast'), themeBtn = $('themeBtn'), submitBtn = $('submitBtn');

    const RING_LEN = 326.7; // เส้นรอบวงของวงแหวน (2πr)

    // ================= Utilities =================
    const formatMoney = n => n.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ฿';
    const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));

    // ---------- Toast ----------
    let toastTimer;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
    }

    // ---------- Animation นับเลขวิ่ง ----------
    function animateNumber(el, from, to, suffixColor) {
      const duration = 700, start = performance.now();
      function tick(now) {
        const p = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3); // ease-out cubic
        el.textContent = formatMoney(from + (to - from) * eased);
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // ---------- Confetti ตอนบันทึกสำเร็จ ----------
    function launchConfetti() {
      const colors = ['#8b5cf6', '#ec4899', '#34d399', '#fbbf24', '#60a5fa'];
      for (let i = 0; i < 32; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.animationDuration = 1.4 + Math.random() * 1.4 + 's';
        c.style.animationDelay = Math.random() * 0.4 + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3200);
      }
    }

    // ---------- Ripple บนปุ่มบันทึก ----------
    submitBtn.addEventListener('click', function (e) {
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const r = document.createElement('span');
      r.className = 'ripple';
      r.style.width = r.style.height = size + 'px';
      r.style.left = e.clientX - rect.left - size / 2 + 'px';
      r.style.top = e.clientY - rect.top - size / 2 + 'px';
      this.appendChild(r);
      setTimeout(() => r.remove(), 600);
    });

    // ================= Dashboard =================
    function updateSummary() {
      const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const balance = income - expense;

      // นับเลขวิ่งจากค่าเดิม -> ค่าใหม่
      animateNumber(totalIncomeEl, prev.income, income);
      animateNumber(totalExpenseEl, prev.expense, expense);
      animateNumber(balanceEl, prev.balance, balance);
      prev = { income, expense, balance };

      balanceEl.className = 'balance ' + (balance < 0 ? 'expense-text' : 'income-text');

      // อัปเดตวงแหวนสัดส่วนรายจ่าย
      const pct = income > 0 ? Math.min((expense / income) * 100, 100) : (expense > 0 ? 100 : 0);
      ringFill.style.strokeDashoffset = RING_LEN - (RING_LEN * pct / 100);
      ringPct.textContent = Math.round(pct) + '%';
      ringPct.style.color = pct >= 80 ? 'var(--red)' : pct >= 50 ? '#f59e0b' : 'var(--green)';
    }

    // ================= History =================
    function renderHistory() {
      historyList.innerHTML = '';
      const filtered = [...transactions]
        .filter(t => currentFilter === 'all' || t.type === currentFilter)
        .reverse();

      itemCountEl.textContent = `(${filtered.length} รายการ)`;

      if (filtered.length === 0) {
        historyList.innerHTML = `<li class="empty-msg"><span class="emoji">🪄</span>ยังไม่มีรายการในหมวดนี้</li>`;
        return;
      }

      filtered.forEach((t, i) => {
        const li = document.createElement('li');
        li.className = 'history-item';
        li.style.animationDelay = Math.min(i * 0.05, 0.4) + 's'; // ไล่ทีละรายการ
        const isIncome = t.type === 'income';

        li.innerHTML = `
          <div class="item-icon ${t.type}">${isIncome ? '💵' : '🛒'}</div>
          <div class="item-info">
            <div class="name"></div>
            <div class="date">${t.date}</div>
          </div>
          <span class="item-amount ${isIncome ? 'income-text' : 'expense-text'}">
            ${isIncome ? '+' : '−'}${formatMoney(t.amount)}
          </span>
          <button class="delete-btn" title="ลบรายการ">🗑️</button>
        `;

        li.querySelector('.name').textContent = t.name; // ป้องกัน XSS
        li.querySelector('.delete-btn').addEventListener('click', () => {
          li.classList.add('removing');
          setTimeout(() => deleteTransaction(t.id), 280);
        });

        historyList.appendChild(li);
      });
    }

    function refresh() { save(); updateSummary(); renderHistory(); }

    function deleteTransaction(id) {
      transactions = transactions.filter(t => t.id !== id);
      refresh();
      showToast('🗑️ ลบรายการแล้ว');
    }

    // ================= Events =================
    clearAllBtn.addEventListener('click', () => {
      if (!transactions.length) return;
      if (confirm('ต้องการล้างรายการทั้งหมดใช่หรือไม่?')) {
        transactions = [];
        refresh();
        showToast('✨ ล้างข้อมูลเรียบร้อย');
      }
    });

    // สลับประเภท (สไลด์เลื่อน)
    incomeBtn.addEventListener('click', () => {
      selectedType = 'income';
      typeSlider.classList.remove('right');
      incomeBtn.classList.add('on'); expenseBtn.classList.remove('on');
    });
    expenseBtn.addEventListener('click', () => {
      selectedType = 'expense';
      typeSlider.classList.add('right');
      expenseBtn.classList.add('on'); incomeBtn.classList.remove('on');
    });

    // แท็บกรอง
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderHistory();
      });
    });

    // บันทึกรายการ
    form.addEventListener('submit', e => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const amount = parseFloat(amountInput.value);

      if (!name || isNaN(amount) || amount <= 0) {
        showToast('⚠️ กรุณากรอกข้อมูลให้ถูกต้อง');
        return;
      }

      transactions.push({
        id: Date.now(), name, amount, type: selectedType,
        date: new Date().toLocaleString('th-TH', {
          day: 'numeric', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        })
      });

      form.reset();
      nameInput.focus();
      refresh();
      launchConfetti(); // 🎉 ฉลองทุกครั้งที่บันทึก
      showToast(selectedType === 'income' ? '💰 บันทึกรายรับแล้ว!' : '✅ บันทึกรายจ่ายแล้ว!');
    });

    // ================= Dark Mode =================
    function applyTheme(dark) {
      document.body.classList.toggle('dark', dark);
      themeBtn.textContent = dark ? '☀️' : '🌙';
      localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
    }
    themeBtn.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark')));
    applyTheme(localStorage.getItem(THEME_KEY) === 'dark'); // โหลดธีมที่บันทึกไว้

    // ================= เริ่มต้น =================
    updateSummary();
    renderHistory();
  </script>
</body>
</html>
