<div class="glass rounded-2xl mt-6 px-4 md:px-6 py-4">
  <div class="flex items-center justify-center gap-4 sm:gap-8 mb-4">
    <div class="text-center flex-1 sm:flex-none">
      <p id="stat-pending" class="text-2xl font-bold text-amber-300 glow-amber">0</p>
      <p class="text-[10px] sm:text-xs text-stone-400 uppercase tracking-widest">ค้างอยู่</p>
    </div>
    <div class="w-px h-10 bg-orange-500/20"></div>
    <div class="text-center flex-1 sm:flex-none">
      <p id="stat-done" class="text-2xl font-bold text-orange-500 glow-orange">0</p>
      <p class="text-[10px] sm:text-xs text-stone-400 uppercase tracking-widest">เสร็จแล้ว</p>
    </div>
    <div class="w-px h-10 bg-orange-500/20"></div>
    <div class="text-center flex-1 sm:flex-none min-w-[60px]">
      <p id="stat-percent" class="text-2xl font-bold text-yellow-300">0%</p>
      <p class="text-[10px] sm:text-xs text-stone-400 uppercase tracking-widest">ความคืบหน้า</p>
    </div>
  </div>
  <div class="h-2.5 bg-white/5 rounded-full overflow-hidden">
    <div id="progress-bar" class="h-full rounded-full shimmer bg-gradient-to-r from-red-500 via-orange-500 to-amber-400 transition-all duration-700" style="width:0%"></div>
  </div>
  <p id="cheer" class="text-xs text-stone-500 mt-2 h-4"></p>
</div>
<form id="task-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <div class="md:col-span-2">
    <label for="input-title" class="block text-xs text-stone-400 mb-1.5">รายละเอียดงาน</label>
    <input id="input-title" type="text" required maxlength="80"
           placeholder="เช่น ทำโจทย์แคลคูลัสให้เสร็จ (บทที่ 4)"
           class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 placeholder-stone-500
                  outline-none transition-all duration-300
                  focus:border-amber-400/60 focus:ring-2 focus:ring-amber-400/20 focus:bg-white/10" />
  </div>

  <div>
    <label for="input-subject" class="block text-xs text-stone-400 mb-1.5">วิชา</label>
    <input id="input-subject" type="text" required maxlength="40"
           placeholder="เช่น คณิตศาสตร์"
           class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 placeholder-stone-500
                  outline-none transition-all duration-300
                  focus:border-orange-400/60 focus:ring-2 focus:ring-orange-400/20 focus:bg-white/10" />
  </div>

  <div>
    <label for="input-deadline" class="block text-xs text-stone-400 mb-1.5">กำหนดส่ง (วันที่ &amp; เวลา)</label>
    <input id="input-deadline" type="datetime-local" required
           class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-stone-200
                  outline-none transition-all duration-300
                  focus:border-orange-400/60 focus:ring-2 focus:ring-orange-400/20 focus:bg-white/10" />
  </div>

  <div class="md:col-span-2">
    <label class="block text-xs text-stone-400 mb-1.5">ระดับความสำคัญ</label>
    <!-- 📱 MOBILE: py-3 ขยายพื้นที่แตะ >= 44px ตามมาตรฐาน touch target -->
    <div class="flex gap-2" id="priority-chips">
      <button type="button" data-p="low"  class="chip flex-1 border border-white/10 rounded-xl py-3 md:py-2 text-xs font-semibold text-stone-400">🟢 ชิล ๆ</button>
      <button type="button" data-p="mid"  class="chip flex-1 border border-white/10 rounded-xl py-3 md:py-2 text-xs font-semibold text-stone-400 active-mid">🟠 ปกติ</button>
      <button type="button" data-p="high" class="chip flex-1 border border-white/10 rounded-xl py-3 md:py-2 text-xs font-semibold text-stone-400">🔴 ด่วนมาก</button>
    </div>
  </div>

  <button type="submit"
          class="md:col-span-2 mt-1 bg-gradient-to-r from-orange-600 to-amber-500 text-black font-bold
                 py-3.5 md:py-3 rounded-xl tracking-wide transition-all duration-300
                 hover:shadow-[0_0_28px_rgba(255,122,0,0.6)] hover:scale-[1.015] active:scale-[0.98]">
    🚀 เพิ่มงาน
  </button>
</form>
<!-- 📱 MOBILE: แถบ filter ปัดเลื่อนแนวนอนได้ -->
<div class="filter-scroll flex gap-2 mb-3" id="filters">
  <button data-f="all"     class="filter-btn active text-xs border border-white/10 rounded-full px-4 py-2 text-stone-400">ทั้งหมด</button>
  <button data-f="pending" class="filter-btn text-xs border border-white/10 rounded-full px-4 py-2 text-stone-400">⏳ ค้างอยู่</button>
  <button data-f="done"    class="filter-btn text-xs border border-white/10 rounded-full px-4 py-2 text-stone-400">✅ เสร็จแล้ว</button>
  <button data-f="overdue" class="filter-btn text-xs border border-white/10 rounded-full px-4 py-2 text-stone-400">🔥 เลยกำหนด</button>
</div>

<!-- 📱 MOBILE: คำใบ้ swipe แสดงเฉพาะจอสัมผัส -->
<p id="swipe-tip" class="text-[11px] text-stone-600 mb-4 hidden">💡 เคล็ดลับ: ปัดการ์ดไปทางซ้ายเพื่อลบงาน</p>

<div id="task-list" class="space-y-4"></div>

<div id="empty-state" class="glass rounded-2xl p-10 text-center hidden">
  <p class="text-5xl mb-3">🏮</p>
  <p class="text-stone-300 font-semibold">เคลียร์หมดแล้ว เก่งมาก!</p>
  <p class="text-stone-500 text-sm mt-1">เพิ่มการบ้านชิ้นแรกของคุณด้านบนเพื่อเริ่มนับถอยหลัง</p>
</div>
